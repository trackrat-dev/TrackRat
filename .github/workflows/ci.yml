name: CI Pipeline

on:
  push:
    branches: [main, develop, infra-ops-*]
    paths:
      - 'backend/**'
      - 'ios/**'
      - 'infra/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'ios/**'
      - 'infra/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  TF_VERSION: '1.7.0'
  TFLINT_VERSION: 'v0.50.0'

jobs:
  # Detect what changed to run appropriate jobs
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      ios: ${{ steps.changes.outputs.ios }}
      infra: ${{ steps.changes.outputs.infra }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            ios:
              - 'ios/**'
              - '.github/workflows/ci.yml'
            infra:
              - 'infra/**'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'

  # Workflow validation
  workflow-validation:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    name: Workflow Validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Validate workflow YAML syntax
        run: |
          echo "🔍 Validating GitHub workflow YAML files..."

          # Check for critical syntax errors only (ignore cosmetic issues)
          yamllint -c - .github/workflows/ << 'EOF'
          extends: default
          rules:
            line-length: disable
            document-start: disable
            truthy: disable
          EOF

          echo "✅ All workflow files have valid YAML syntax"

  # Backend testing with matrix strategy
  backend-tests:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        test-type: [unit, integration, docker]
        include:
          - test-type: unit
            python-version: '3.11'
            postgres: false
            description: "Unit Tests (SQLite)"
          - test-type: integration
            python-version: '3.11'
            postgres: true
            description: "Integration Tests (PostgreSQL)"
          - test-type: docker
            python-version: '3.11'
            postgres: false
            description: "Docker Container Tests"

    name: Backend ${{ matrix.description }}

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trackcast_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        # Only start postgres for integration tests
        if: matrix.postgres

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.test-type }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.test-type }}-
            ${{ runner.os }}-pip-

      # Unit Tests Job
      - name: Install dependencies (Unit Tests)
        if: matrix.test-type == 'unit'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        if: matrix.test-type == 'unit'
        run: |
          # Run unit tests (fast tests that don't require PostgreSQL)
          if [ -f "tests/run_unit_tests.sh" ]; then
            chmod +x tests/run_unit_tests.sh
            ./tests/run_unit_tests.sh
          else
            # Fallback to pytest with unit test markers
            pytest tests/unit/ -v || echo "No unit tests found, skipping"
          fi

      - name: Test requirements files validation (Unit Tests)
        if: matrix.test-type == 'unit'
        run: |
          # Test that inference requirements can be installed
          pip install -r requirements-inference.txt --dry-run
          echo "✓ Inference requirements are valid"

          # Test that we can install them for real
          pip install -r requirements-inference.txt
          echo "✓ Inference requirements installed successfully"

          # Verify key packages are available
          python -c "
          import fastapi
          import uvicorn
          import torch
          import sqlalchemy
          import pandas
          import numpy
          print('✓ Key inference packages verified')
          "

      # Integration Tests Job
      - name: Install dependencies (Integration Tests)
        if: matrix.test-type == 'integration'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run integration tests
        if: matrix.test-type == 'integration'
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trackcast_test
        run: |
          # Run full test suite with PostgreSQL
          ./tests/run_all_tests.sh

      # Docker Tests Job
      - name: Set up Docker Buildx (Docker Tests)
        if: matrix.test-type == 'docker'
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0

      - name: Cache Docker layers
        if: matrix.test-type == 'docker'
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-buildx-

      - name: Build Docker image
        if: matrix.test-type == 'docker'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: false
          load: true
          tags: |
            trackcast-inference:ci-test
            trackcast-inference:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: Test Docker container
        if: matrix.test-type == 'docker'
        run: |
          echo "🔍 Verifying built container..."

          # Check that the image was created
          docker images trackcast-inference:ci-test

          # Check image size (should be reasonable for inference-only)
          SIZE=$(docker images trackcast-inference:ci-test --format "table {{.Size}}" | tail -n 1)
          echo "📦 Image size: $SIZE"

          # Verify container structure and key files
          echo "🔍 Checking container filesystem..."
          docker run --rm trackcast-inference:ci-test ls -la /app/

          # Verify Python packages are installed
          echo "🐍 Checking Python environment..."
          docker run --rm trackcast-inference:ci-test python --version
          docker run --rm trackcast-inference:ci-test pip list | head -20

      - name: Test container startup validation
        if: matrix.test-type == 'docker'
        run: |
          echo "🚀 Testing container can start and import modules..."

          # Test basic imports without external dependencies
          docker run --rm \
            -e MODEL_PATH="/app/models" \
            -e TRACKCAST_ENV="ci" \
            trackcast-inference:ci-test \
            python -c "
          import sys
          print(f'Python version: {sys.version}')

          # Test critical imports
          try:
              import fastapi
              print('✅ FastAPI imported')

              import uvicorn
              print('✅ Uvicorn imported')

              import torch
              print('✅ PyTorch imported')

              import sqlalchemy
              print('✅ SQLAlchemy imported')

              import pandas
              print('✅ Pandas imported')

              # Test app can be imported
              from trackcast.api.app import app
              print('✅ TrackCast app imported')

              # Check that key routes exist
              routes = [route.path for route in app.routes if hasattr(route, 'path')]
              expected_routes = ['/', '/health']
              for route in expected_routes:
                  if route in routes:
                      print(f'✅ Route {route} found')
                  else:
                      print(f'❌ Route {route} missing')
                      sys.exit(1)

              print('🎉 All validations passed!')

          except ImportError as e:
              print(f'❌ Import error: {e}')
              sys.exit(1)
          except Exception as e:
              print(f'❌ Validation error: {e}')
              sys.exit(1)
          "

      - name: Test CLI access
        if: matrix.test-type == 'docker'
        run: |
          echo "🔧 Testing CLI tool access..."

          # Test that trackcast CLI is available
          docker run --rm trackcast-inference:ci-test which trackcast

          # Test CLI help (should work without database)
          docker run --rm trackcast-inference:ci-test trackcast --help

      - name: Test container security
        if: matrix.test-type == 'docker'
        run: |
          echo "🔒 Checking container security..."

          # Verify running as non-root user
          USER_CHECK=$(docker run --rm trackcast-inference:ci-test whoami)
          if [ "$USER_CHECK" = "trackcast" ]; then
            echo "✅ Container runs as non-root user: $USER_CHECK"
          else
            echo "❌ Container should run as 'trackcast' user, but runs as: $USER_CHECK"
            exit 1
          fi

          # Check key directories exist with correct permissions
          docker run --rm trackcast-inference:ci-test ls -la /app/models/
          echo "✅ Models directory exists"

      - name: Update Docker cache
        if: matrix.test-type == 'docker'
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # Save Docker image as artifact for deployment
      - name: Save Docker image
        if: matrix.test-type == 'docker' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/docker-save
          docker save trackcast-inference:${{ github.sha }} | gzip > /tmp/docker-save/trackcast-inference.tar.gz

      - name: Upload Docker image artifact
        if: matrix.test-type == 'docker' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v3
        with:
          name: docker-image-${{ github.sha }}
          path: /tmp/docker-save/
          retention-days: 1

  # iOS tests
  ios-tests:
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-latest
    name: iOS Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Run iOS tests
        working-directory: ./ios
        run: |
          xcodebuild test \
            -scheme TrackRat \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -derivedDataPath DerivedData \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult

  # Infrastructure tests
  infra-tests:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    name: Infrastructure Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Cache Terraform plugins
        uses: actions/cache@v3
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('infra/**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Terraform Format Check
        working-directory: ./infra
        run: |
          terraform fmt -check -recursive
          if [ $? -ne 0 ]; then
            echo "❌ Terraform files are not properly formatted"
            echo "Run 'terraform fmt -recursive' to fix formatting"
            exit 1
          fi
          echo "✅ All Terraform files are properly formatted"

      - name: Terraform Validate
        working-directory: ./infra
        run: |
          # Initialize and validate root module
          terraform init -backend=false
          terraform validate

          # Validate each module
          for module_dir in modules/*/; do
            if [ -d "$module_dir" ]; then
              echo "Validating module: $module_dir"
              (cd "$module_dir" && terraform init -backend=false && terraform validate)
            fi
          done

          # Validate each environment
          for env_dir in environments/*/; do
            if [ -d "$env_dir" ]; then
              echo "Validating environment: $env_dir"
              (cd "$env_dir" && terraform init -backend=false && terraform validate)
            fi
          done

      - name: Initialize TFLint
        working-directory: ./infra
        run: tflint --init

      - name: Run TFLint
        working-directory: ./infra
        run: |
          # Run tflint on root module
          tflint

          # Run tflint on each module
          for module_dir in modules/*/; do
            if [ -d "$module_dir" ]; then
              echo "Running tflint on module: $module_dir"
              tflint --chdir="$module_dir"
            fi
          done

          # Run tflint on each environment
          for env_dir in environments/*/; do
            if [ -d "$env_dir" ]; then
              echo "Running tflint on environment: $env_dir"
              tflint --chdir="$env_dir"
            fi
          done

  # Summary job that depends on all tests
  ci-summary:
    runs-on: ubuntu-latest
    needs: [changes, workflow-validation, backend-tests, ios-tests, infra-tests]
    if: always()
    name: CI Summary

    steps:
      - name: Generate CI summary
        run: |
          echo "## 🚀 CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check what was tested
          backend_changed="${{ needs.changes.outputs.backend }}"
          ios_changed="${{ needs.changes.outputs.ios }}"
          infra_changed="${{ needs.changes.outputs.infra }}"
          workflows_changed="${{ needs.changes.outputs.workflows }}"

          echo "### 📋 Components Tested" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$workflows_changed" == "true" ]]; then
            workflows_result="${{ needs.workflow-validation.result }}"
            if [[ "$workflows_result" == "success" ]]; then
              echo "✅ **Workflows**: YAML validation passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Workflows**: YAML validation failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⏭️ **Workflows**: No changes detected" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "$backend_changed" == "true" ]]; then
            backend_result="${{ needs.backend-tests.result }}"
            if [[ "$backend_result" == "success" ]]; then
              echo "✅ **Backend**: All tests passed (Unit + Integration + Docker)" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Backend**: Tests failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⏭️ **Backend**: No changes detected" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "$ios_changed" == "true" ]]; then
            ios_result="${{ needs.ios-tests.result }}"
            if [[ "$ios_result" == "success" ]]; then
              echo "✅ **iOS**: Tests passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **iOS**: Tests failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⏭️ **iOS**: No changes detected" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "$infra_changed" == "true" ]]; then
            infra_result="${{ needs.infra-tests.result }}"
            if [[ "$infra_result" == "success" ]]; then
              echo "✅ **Infrastructure**: Validation passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Infrastructure**: Validation failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⏭️ **Infrastructure**: No changes detected" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

