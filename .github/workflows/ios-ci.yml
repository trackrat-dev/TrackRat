# TrackRat iOS CI
# Separate from ci-cd-v2.yml so iOS-only changes don't trigger backend/terraform/docker jobs.

name: iOS CI

on:
  push:
    branches: [main, production]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-ios:
    name: iOS Build & Test
    # macos-26 so the default toolchain ships the iOS 26 SDK. The app calls iOS 26
    # Liquid Glass APIs (e.g. sharedBackgroundVisibility, containerBackground(.navigation))
    # behind #available(iOS 26, *); those are runtime gates, but the symbols must still
    # exist at compile time. An older SDK (Xcode 16.x / iOS 18.5) fails to compile them.
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Select latest Xcode (needs iOS 26 SDK)
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | grep -vi beta | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "::error::No Xcode found under /Applications"
            exit 1
          fi
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks | grep -i "iphonesimulator" || true

      - name: Select simulator destination
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available -j | jq -r '.devices | to_entries | map(select(.key | contains("iOS"))) | map(.value) | flatten | .[0].name // empty')
          if [ -z "$NAME" ]; then
            echo "::error::No available iOS simulator found on this runner"
            xcrun simctl list
            exit 1
          fi
          echo "Selected simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build and test
        working-directory: ios
        run: |
          xcodebuild test \
            -scheme TrackRat \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ios-test-results
          path: ios/TestResults.xcresult
