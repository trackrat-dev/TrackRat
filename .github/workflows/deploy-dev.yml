name: Deploy Application to Dev

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-dev.yml'
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]
    branches: [main]

env:
  PROJECT_ID: trackrat-dev
  REGION: us-central1
  SERVICE_NAME: trackcast-inference
  REPOSITORY: trackcast-inference-dev

jobs:
  deploy-application-dev:
    name: Deploy Application to Development
    runs-on: ubuntu-latest
    
    # Only run if all prerequisite workflows passed
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    
    environment: 
      name: development
      url: https://trackcast-inference-dev-url.a.run.app
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker to use gcloud as a credential helper
      run: gcloud auth configure-docker us-central1-docker.pkg.dev

    - name: Build and push Docker image
      working-directory: ./backend
      run: |
        # Generate image tag
        IMAGE_TAG="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
        LATEST_TAG="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest"
        
        echo "🐳 Building Docker image..."
        docker build -t $IMAGE_TAG -t $LATEST_TAG .
        
        echo "📤 Pushing Docker image to Artifact Registry..."
        docker push $IMAGE_TAG
        docker push $LATEST_TAG
        
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "✅ Image pushed successfully: $IMAGE_TAG"

    - name: Run database migrations
      run: |
        echo "🗄️ Running database migrations..."
        
        # Create a temporary Cloud Run job to run migrations
        gcloud run jobs create trackcast-migrate-${{ github.sha }} \
          --image=${{ env.IMAGE_TAG }} \
          --region=${{ env.REGION }} \
          --task-timeout=300 \
          --memory=1Gi \
          --cpu=1 \
          --set-secrets=DATABASE_URL=trackcast-dev-secrets:latest \
          --set-env-vars=TRACKCAST_ENV=dev \
          --command=trackcast \
          --args=init-db \
          --max-retries=0 || true
        
        # Execute the migration job
        gcloud run jobs execute trackcast-migrate-${{ github.sha }} \
          --region=${{ env.REGION }} \
          --wait
        
        # Clean up the job
        gcloud run jobs delete trackcast-migrate-${{ github.sha }} \
          --region=${{ env.REGION }} \
          --quiet
        
        echo "✅ Database migrations completed"

    - name: Deploy to Cloud Run
      run: |
        echo "🚀 Deploying to Cloud Run..."
        
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image=${{ env.IMAGE_TAG }} \
          --platform=managed \
          --region=${{ env.REGION }} \
          --allow-unauthenticated \
          --memory=2Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=10 \
          --timeout=300 \
          --concurrency=80 \
          --port=8000 \
          --set-env-vars=TRACKCAST_ENV=dev,MODEL_PATH=/app/models \
          --set-secrets=DATABASE_URL=trackcast-dev-secrets:latest,NJT_USERNAME=trackcast-dev-secrets:latest,NJT_PASSWORD=trackcast-dev-secrets:latest \
          --execution-environment=gen2 \
          --service-account=trackcast-dev-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
        
        echo "✅ Cloud Run deployment completed"

    - name: Get service URL
      id: service-url
      run: |
        SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
          --region=${{ env.REGION }} \
          --format='value(status.url)')
        echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV
        echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
        echo "🔗 Service URL: $SERVICE_URL"

    - name: Health check
      run: |
        echo "🏥 Performing health check..."
        
        # Wait a moment for the service to be ready
        sleep 30
        
        # Check health endpoint
        HEALTH_URL="${{ env.SERVICE_URL }}/health"
        
        for i in {1..5}; do
          echo "Health check attempt $i/5..."
          
          if curl -f -s "$HEALTH_URL" > /dev/null; then
            echo "✅ Health check passed!"
            curl -s "$HEALTH_URL" | jq '.' || echo "Health endpoint returned non-JSON response"
            break
          else
            echo "❌ Health check failed, retrying in 30 seconds..."
            if [ $i -eq 5 ]; then
              echo "❌ All health checks failed"
              exit 1
            fi
            sleep 30
          fi
        done

    - name: Test API endpoints
      run: |
        echo "🧪 Testing API endpoints..."
        
        # Test trains endpoint
        TRAINS_URL="${{ env.SERVICE_URL }}/api/trains/?limit=5"
        echo "Testing: $TRAINS_URL"
        
        if curl -f -s "$TRAINS_URL" > /dev/null; then
          echo "✅ Trains API endpoint is responding"
        else
          echo "⚠️ Trains API endpoint check failed (may be expected if no data)"
        fi
        
        # Test stops endpoint
        STOPS_URL="${{ env.SERVICE_URL }}/api/stops/"
        echo "Testing: $STOPS_URL"
        
        if curl -f -s "$STOPS_URL" > /dev/null; then
          echo "✅ Stops API endpoint is responding"
        else
          echo "⚠️ Stops API endpoint check failed (may be expected if no data)"
        fi

    - name: Deployment Summary
      run: |
        echo "## 🚀 Development Application Deployment" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Application deployed successfully**" >> $GITHUB_STEP_SUMMARY
        echo "🔗 **Service URL**: [${{ env.SERVICE_URL }}](${{ env.SERVICE_URL }})" >> $GITHUB_STEP_SUMMARY
        echo "🏥 **Health Check**: [${{ env.SERVICE_URL }}/health](${{ env.SERVICE_URL }}/health)" >> $GITHUB_STEP_SUMMARY
        echo "📊 **API Endpoints**:" >> $GITHUB_STEP_SUMMARY
        echo "- [Trains API](${{ env.SERVICE_URL }}/api/trains/)" >> $GITHUB_STEP_SUMMARY
        echo "- [Stops API](${{ env.SERVICE_URL }}/api/stops/)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Docker Image**: \`${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Deployment Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "🔧 **Next Steps**:" >> $GITHUB_STEP_SUMMARY
        echo "- Start data collection: \`trackcast start-scheduler\`" >> $GITHUB_STEP_SUMMARY
        echo "- Check service logs in [Cloud Run Console](https://console.cloud.google.com/run/detail/${{ env.REGION }}/${{ env.SERVICE_NAME }}/logs?project=${{ env.PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY