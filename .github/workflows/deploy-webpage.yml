name: Deploy Web Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'webpage_v2/**'
      - '.github/workflows/deploy-webpage.yml'
  workflow_dispatch:  # Allows manual trigger for testing

permissions:
  contents: write  # Needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webpage_v2/package-lock.json

      - name: Install dependencies
        working-directory: ./webpage_v2
        run: npm ci --ignore-scripts

      - name: Build
        working-directory: ./webpage_v2
        run: npm run build

      - name: Copy index.html as 404.html for SPA routing
        working-directory: ./webpage_v2
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webpage_v2/dist
          cname: false  # Set to your custom domain if you have one
