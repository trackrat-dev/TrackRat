name: Backend CI

on:
  push:
    branches: [ main, develop, infra-ops-* ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

# Allow manual workflow dispatch
workflow_dispatch:

jobs:
  # Test Python code quality and unit tests
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    
    strategy:
      matrix:
        python-version: [3.11]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        # Run unit tests (fast tests that don't require PostgreSQL)
        if [ -f "tests/run_unit_tests.sh" ]; then
          chmod +x tests/run_unit_tests.sh
          ./tests/run_unit_tests.sh
        else
          # Fallback to pytest with unit test markers
          pytest tests/unit/ -v || echo "No unit tests found, skipping"
        fi

  # Test Docker container build
  docker-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        target: runtime
        push: false
        tags: |
          trackcast-inference:test
          trackcast-inference:${{ github.sha }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1

    - name: Test Docker image
      run: |
        # Load the built image
        docker buildx build \
          --target runtime \
          --tag trackcast-inference:test \
          --load \
          .

        # Test that the image was created successfully
        docker images trackcast-inference:test

        # Test that the container can start (without external dependencies)
        # We'll run a quick validation that doesn't require database/models
        docker run --rm \
          -e DATABASE_URL="sqlite:///tmp/test.db" \
          -e MODEL_PATH="/app/models" \
          -e TRACKCAST_ENV="test" \
          trackcast-inference:test \
          python -c "
import sys
sys.path.append('/app')
try:
    from trackcast.api.app import app
    print('✓ FastAPI app imports successfully')
    
    from trackcast.config import load_config
    print('✓ Configuration module loads successfully')
    
    print('✓ Container validation passed')
except Exception as e:
    print(f'✗ Container validation failed: {e}')
    sys.exit(1)
"

        # Test that the health check endpoint can be imported
        # (We can't test the full endpoint without a database)
        docker run --rm \
          -e DATABASE_URL="sqlite:///tmp/test.db" \
          -e MODEL_PATH="/app/models" \
          trackcast-inference:test \
          python -c "
try:
    from trackcast.api.app import app
    # Check that health endpoint exists
    routes = [route.path for route in app.routes]
    if '/health' in routes:
        print('✓ Health check endpoint found')
    else:
        print('✗ Health check endpoint missing')
        exit(1)
except Exception as e:
    print(f'✗ Health check validation failed: {e}')
    exit(1)
"

    - name: Move cache
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # Test requirements files are valid
  requirements-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Test inference requirements install
      run: |
        python -m pip install --upgrade pip
        
        # Test that inference requirements can be installed
        pip install -r requirements-inference.txt --dry-run
        echo "✓ Inference requirements are valid"
        
        # Test that we can install them for real
        pip install -r requirements-inference.txt
        echo "✓ Inference requirements installed successfully"
        
        # Verify key packages are available
        python -c "
import fastapi
import uvicorn  
import torch
import sqlalchemy
import pandas
import numpy
print('✓ Key inference packages verified')
"

    - name: Compare requirements files
      run: |
        # Basic check that inference requirements is a subset of full requirements
        echo "Checking requirements file differences..."
        
        if [ -f "requirements.txt" ] && [ -f "requirements-inference.txt" ]; then
          echo "Both requirements files found"
          
          # Count packages (basic validation)
          FULL_COUNT=$(grep -c "^[a-zA-Z]" requirements.txt || echo "0")
          INFERENCE_COUNT=$(grep -c "^[a-zA-Z]" requirements-inference.txt || echo "0")
          
          echo "Full requirements packages: $FULL_COUNT"
          echo "Inference requirements packages: $INFERENCE_COUNT"
          
          if [ "$INFERENCE_COUNT" -gt 0 ] && [ "$INFERENCE_COUNT" -lt "$FULL_COUNT" ]; then
            echo "✓ Inference requirements appears to be a proper subset"
          else
            echo "⚠ Unusual package counts - manual review recommended"
          fi
        else
          echo "⚠ One or both requirements files missing"
        fi