name: CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]
  workflow_dispatch:
    inputs:
      deployment_method:
        description: 'Deployment method (terraform or ocuroot)'
        required: false
        default: 'terraform'
        type: choice
        options:
          - terraform
          - ocuroot

permissions:
  contents: read
  pull-requests: read

env:
  TF_VERSION: '1.7.0'
  TFLINT_VERSION: 'v0.50.0'
  REGION: us-central1
  SERVICE_NAME: trackcast-inference
  # Deployment method: 'terraform' (default) or 'ocuroot'
  # Can be overridden via repository variables or workflow_dispatch
  DEPLOYMENT_METHOD: ocuroot

jobs:
  # Simplified CI/CD: Run all tests unconditionally
  test:
    runs-on: ubuntu-latest
    name: Test All Components

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: trackratuser
          POSTGRES_PASSWORD: password
          POSTGRES_DB: trackratdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432

    steps:
      # Setup
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend Tests
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-
            ${{ runner.os }}-pip-

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend_v2/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        working-directory: ./backend_v2
        run: |
          echo "📦 Installing dependencies with Poetry..."
          poetry install --no-interaction --no-ansi

      - name: Setup test database
        run: |
          echo "🗄️ Setting up test databases..."
          # Install PostgreSQL client
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          # Create test database on the correct port (5434)
          PGPASSWORD=password createdb -h localhost -p 5434 -U trackratuser trackratdb_test

      - name: Run backend tests and checks
        working-directory: ./backend_v2
        env:
          TRACKRAT_DATABASE_URL: postgresql+asyncpg://trackratuser:password@localhost:5434/trackratdb_test
          TRACKRAT_TEST_DATABASE_URL: postgresql+asyncpg://trackratuser:password@localhost:5434/trackratdb_test
        run: |
          echo "🧪 Running tests and code quality checks with optimized script..."
          chmod +x run_tests_with_db.sh
          # Skip database setup since it's already configured
          export CLEANUP_DB=false
          ./run_tests_with_db.sh

      - name: Clean up Python environment
        working-directory: ./backend_v2
        run: |
          echo "🧹 Cleaning up to save space before Docker build..."
          rm -rf .venv
          poetry cache clear pypi --all -n
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          echo "💾 Disk space after cleanup:"
          df -h

      # Docker Build (only for deployable branches)
      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0

      - name: Generate automatic version
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        run: |
          # Create automatic version using date + build number + sha
          VERSION="$(date -u +%Y.%m.%d)-build${{ github.run_number }}-${GITHUB_SHA:0:7}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Generated version: $VERSION"

      - name: Build and push Docker image for main branch (staging only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend_v2
          file: ./backend_v2/Dockerfile
          target: runtime
          push: true
          tags: |
            us-central1-docker.pkg.dev/trackrat-staging/trackcast-inference-staging/${{ env.SERVICE_NAME }}:${{ env.VERSION }}
            us-central1-docker.pkg.dev/trackrat-staging/trackcast-inference-staging/${{ env.SERVICE_NAME }}:latest
            us-central1-docker.pkg.dev/trackrat-staging/trackcast-inference-staging/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=us-central1-docker.pkg.dev/trackrat-staging/trackcast-inference-staging/${{ env.SERVICE_NAME }}:cache
          cache-to: type=registry,ref=us-central1-docker.pkg.dev/trackrat-staging/trackcast-inference-staging/${{ env.SERVICE_NAME }}:cache,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEBIAN_FRONTEND=noninteractive
          provenance: false
          sbom: false

      - name: Build and push Docker image for production branch
        if: github.ref == 'refs/heads/production'
        uses: docker/build-push-action@v5
        with:
          context: ./backend_v2
          file: ./backend_v2/Dockerfile
          target: runtime
          push: true
          tags: |
            us-central1-docker.pkg.dev/trackrat-prod/trackcast-inference-prod/${{ env.SERVICE_NAME }}:${{ env.VERSION }}
            us-central1-docker.pkg.dev/trackrat-prod/trackcast-inference-prod/${{ env.SERVICE_NAME }}:latest
            us-central1-docker.pkg.dev/trackrat-prod/trackcast-inference-prod/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=us-central1-docker.pkg.dev/trackrat-prod/trackcast-inference-prod/${{ env.SERVICE_NAME }}:cache
          cache-to: type=registry,ref=us-central1-docker.pkg.dev/trackrat-prod/trackcast-inference-prod/${{ env.SERVICE_NAME }}:cache,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEBIAN_FRONTEND=noninteractive
          provenance: false
          sbom: false

      # Infrastructure Tests
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Cache Terraform plugins
        uses: actions/cache@v3
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('infra/**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

#      - name: Terraform validation and linting
#        working-directory: ./infra
#        run: |
#          echo "🔧 Running Terraform format check..."
#          terraform fmt -check -recursive
#          echo "🔧 Running Terraform validation..."
#          terraform init -backend=false
#          terraform validate
#          # Validate modules
#          for module_dir in modules/*/; do
#            if [ -d "$module_dir" ]; then
#              echo "Validating module: $module_dir"
#              (cd "$module_dir" && terraform init -backend=false && terraform validate)
#            fi
#          done
#          # Validate environments
#          for env_dir in environments/*/; do
#            if [ -d "$env_dir" ]; then
#              echo "Validating environment: $env_dir"
#              (cd "$env_dir" && terraform init -backend=false && terraform validate)
#            fi
#          done
#          echo "🔧 Running TFLint..."
#          tflint --init
#          tflint
#          for module_dir in modules/*/; do
#            if [ -d "$module_dir" ]; then
#              tflint --chdir="$module_dir"
#            fi
#          done
#          for env_dir in environments/*/; do
#            if [ -d "$env_dir" ]; then
#              tflint --chdir="$env_dir"
#            fi
#          done

      # Workflow Validation
      - name: Install yamllint
        run: pip install yamllint

      - name: Validate workflow YAML syntax
        run: |
          echo "🔍 Validating GitHub workflow YAML files..."
          yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}' .github/workflows/
          echo "✅ All workflow files have valid YAML syntax"

      # Cleanup
      - name: Cleanup Docker
        if: always()
        run: |
          echo "🧹 Cleaning up Docker to save space..."
          docker system prune -af
          docker image prune -af

  # Deploy to staging when main branch is pushed (using composite action)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test]
    # SAFETY: Explicit branch check - ONLY main branch deploys to staging
    if: github.ref == 'refs/heads/main' && needs.test.result == 'success'

    environment:
      name: staging
      url: https://staging.api.trackrat.net

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Deployment Method
        id: deploy_method
        run: |
          # Use workflow_dispatch input if provided, otherwise use env default
          METHOD="${{ github.event.inputs.deployment_method || env.DEPLOYMENT_METHOD }}"
          echo "📦 Deployment Method: $METHOD"
          echo "method=$METHOD" >> $GITHUB_OUTPUT

      # Use composite action for deployment
      - name: Deploy to Staging
        uses: ./.github/actions/deploy-trackrat
        with:
          environment: staging
          project_id: trackrat-staging
          repository: trackcast-inference-staging
          environment_dir: staging
          service_name: trackrat-api-staging
          service_url: https://staging.api.trackrat.net
          ocuroot_env: staging
          deployment_method: ${{ steps.deploy_method.outputs.method }}
          gcp_sa_key: ${{ secrets.GCP_SA_KEY }}
          ocuroot_pat: ${{ secrets.OCUROOT_PAT }}
          github_sha: ${{ github.sha }}
          github_run_number: ${{ github.run_number }}
          tf_version: ${{ env.TF_VERSION }}
          region: ${{ env.REGION }}

  # Deploy to production when production branch is pushed (using composite action)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    # SAFETY: Explicit branch check - ONLY production branch deploys to production
    if: github.ref == 'refs/heads/production' && needs.test.result == 'success'

    # GitHub environment protection for production (requires manual approval)
    environment:
      name: production
      url: https://prod.api.trackrat.net

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Deployment Method
        id: deploy_method
        run: |
          # Use workflow_dispatch input if provided, otherwise use env default
          METHOD="${{ github.event.inputs.deployment_method || env.DEPLOYMENT_METHOD }}"
          echo "📦 Deployment Method: $METHOD"
          echo "method=$METHOD" >> $GITHUB_OUTPUT

      # Use composite action for deployment
      - name: Deploy to Production
        uses: ./.github/actions/deploy-trackrat
        with:
          environment: production
          project_id: trackrat-prod
          repository: trackcast-inference-prod
          environment_dir: prod
          service_name: trackrat-api-prod
          service_url: https://prod.api.trackrat.net
          ocuroot_env: production
          deployment_method: ${{ steps.deploy_method.outputs.method }}
          gcp_sa_key: ${{ secrets.GCP_SA_KEY }}
          ocuroot_pat: ${{ secrets.OCUROOT_PAT }}
          github_sha: ${{ github.sha }}
          github_run_number: ${{ github.run_number }}
          tf_version: ${{ env.TF_VERSION }}
          region: ${{ env.REGION }}

  # Summary job - always runs
  summary:
    runs-on: ubuntu-latest
    needs: [test, deploy-staging, deploy-production]
    if: always()
    name: Pipeline Summary

    steps:
      - name: Generate pipeline summary
        run: |
          echo "## 🚀 CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status based on new job structure
          if [[ "${{ needs.deploy-staging.result }}" == "success" || "${{ needs.deploy-production.result }}" == "success" ]]; then
            echo "✅ **Pipeline Status**: Deployment Successful" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.deploy-staging.result }}" == "skipped" && "${{ needs.deploy-production.result }}" == "skipped" ]]; then
            echo "🟡 **Pipeline Status**: Tests Completed (No Deployment - Not Main/Production Branch or Tests Failed)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Pipeline Status**: Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Result**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Staging Deploy**: ${{ needs.deploy-staging.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Production Deploy**: ${{ needs.deploy-production.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
