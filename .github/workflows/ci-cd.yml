name: CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  TF_VERSION: '1.7.0'
  TFLINT_VERSION: 'v0.50.0'
  REGION: us-central1
  SERVICE_NAME: trackcast-inference

jobs:
  # Simplified CI/CD: Run all tests unconditionally
  test:
    runs-on: ubuntu-latest
    name: Test All Components

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: trackratuser
          POSTGRES_PASSWORD: password
          POSTGRES_DB: trackratdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432

    steps:
      # Setup
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend Tests
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-
            ${{ runner.os }}-pip-

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.7.1
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('backend_v2/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        working-directory: ./backend_v2
        run: |
          echo "📦 Installing dependencies with Poetry..."
          poetry install --no-interaction --no-ansi

      - name: Setup test database
        run: |
          echo "🗄️ Setting up test databases..."
          # Install PostgreSQL client
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          # Create test database on the correct port (5434)
          PGPASSWORD=password createdb -h localhost -p 5434 -U trackratuser trackratdb_test

      - name: Run backend tests and checks
        working-directory: ./backend_v2
        env:
          TRACKRAT_DATABASE_URL: postgresql+asyncpg://trackratuser:password@localhost:5434/trackratdb_test
          TRACKRAT_TEST_DATABASE_URL: postgresql+asyncpg://trackratuser:password@localhost:5434/trackratdb_test
        run: |
          echo "🧪 Running tests and code quality checks with optimized script..."
          chmod +x run_tests_with_db.sh
          # Skip database setup since it's already configured
          export CLEANUP_DB=false
          ./run_tests_with_db.sh

      - name: Clean up Python environment
        working-directory: ./backend_v2
        run: |
          echo "🧹 Cleaning up to save space before Docker build..."
          rm -rf .venv
          poetry cache clear pypi --all -n
          find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
          find . -type f -name "*.pyc" -delete 2>/dev/null || true
          echo "💾 Disk space after cleanup:"
          df -h

      # Docker Build (only for deployable branches)
      - name: Authenticate to Google Cloud
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0

      - name: Generate automatic version
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
        run: |
          # Create automatic version using date + build number + sha
          VERSION="$(date -u +%Y.%m.%d)-build${{ github.run_number }}-${GITHUB_SHA:0:7}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Generated version: $VERSION"

      - name: Build and push Docker image for main branch (staging only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend_v2
          file: ./backend_v2/Dockerfile
          target: runtime
          push: true
          tags: |
            us-central1-docker.pkg.dev/trackrat-staging/trackcast-inference-staging/${{ env.SERVICE_NAME }}:${{ env.VERSION }}
            us-central1-docker.pkg.dev/trackrat-staging/trackcast-inference-staging/${{ env.SERVICE_NAME }}:latest
            us-central1-docker.pkg.dev/trackrat-staging/trackcast-inference-staging/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=us-central1-docker.pkg.dev/trackrat-staging/trackcast-inference-staging/${{ env.SERVICE_NAME }}:cache
          cache-to: type=registry,ref=us-central1-docker.pkg.dev/trackrat-staging/trackcast-inference-staging/${{ env.SERVICE_NAME }}:cache,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEBIAN_FRONTEND=noninteractive
          provenance: false
          sbom: false

      - name: Build and push Docker image for production branch
        if: github.ref == 'refs/heads/production'
        uses: docker/build-push-action@v5
        with:
          context: ./backend_v2
          file: ./backend_v2/Dockerfile
          target: runtime
          push: true
          tags: |
            us-central1-docker.pkg.dev/trackrat-prod/trackcast-inference-prod/${{ env.SERVICE_NAME }}:${{ env.VERSION }}
            us-central1-docker.pkg.dev/trackrat-prod/trackcast-inference-prod/${{ env.SERVICE_NAME }}:latest
            us-central1-docker.pkg.dev/trackrat-prod/trackcast-inference-prod/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=us-central1-docker.pkg.dev/trackrat-prod/trackcast-inference-prod/${{ env.SERVICE_NAME }}:cache
          cache-to: type=registry,ref=us-central1-docker.pkg.dev/trackrat-prod/trackcast-inference-prod/${{ env.SERVICE_NAME }}:cache,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEBIAN_FRONTEND=noninteractive
          provenance: false
          sbom: false

      # Infrastructure Tests
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Cache Terraform plugins
        uses: actions/cache@v3
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('infra/**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

#      - name: Terraform validation and linting
#        working-directory: ./infra
#        run: |
#          echo "🔧 Running Terraform format check..."
#          terraform fmt -check -recursive
#          echo "🔧 Running Terraform validation..."
#          terraform init -backend=false
#          terraform validate
#          # Validate modules
#          for module_dir in modules/*/; do
#            if [ -d "$module_dir" ]; then
#              echo "Validating module: $module_dir"
#              (cd "$module_dir" && terraform init -backend=false && terraform validate)
#            fi
#          done
#          # Validate environments
#          for env_dir in environments/*/; do
#            if [ -d "$env_dir" ]; then
#              echo "Validating environment: $env_dir"
#              (cd "$env_dir" && terraform init -backend=false && terraform validate)
#            fi
#          done
#          echo "🔧 Running TFLint..."
#          tflint --init
#          tflint
#          for module_dir in modules/*/; do
#            if [ -d "$module_dir" ]; then
#              tflint --chdir="$module_dir"
#            fi
#          done
#          for env_dir in environments/*/; do
#            if [ -d "$env_dir" ]; then
#              tflint --chdir="$env_dir"
#            fi
#          done

      # Workflow Validation
      - name: Install yamllint
        run: pip install yamllint

      - name: Validate workflow YAML syntax
        run: |
          echo "🔍 Validating GitHub workflow YAML files..."
          yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}' .github/workflows/
          echo "✅ All workflow files have valid YAML syntax"

      # Cleanup
      - name: Cleanup Docker
        if: always()
        run: |
          echo "🧹 Cleaning up Docker to save space..."
          docker system prune -af
          docker image prune -af

  # Deploy to staging when main branch is pushed
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && needs.test.result == 'success'

    environment:
      name: staging
      url: https://staging.api.trackrat.net

    env:
      PROJECT_ID: trackrat-staging
      REPOSITORY: trackcast-inference-staging
      ENVIRONMENT: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Step 1: Ensure Artifact Registry repository exists
      - name: Setup Artifact Registry Repository
        working-directory: ./infra/environments/${{ env.ENVIRONMENT }}
        run: |
          echo "🏗️ Setting up Artifact Registry repository..."

          # Initialize Terraform
          terraform init

          # Create minimal terraform.tfvars for repository setup
          cat > terraform.tfvars << EOF
          project_id = "${{ env.PROJECT_ID }}"
          region = "${{ env.REGION }}"
          zone = "${{ env.REGION }}-b"
          api_image_url = "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:placeholder"
          scheduler_image_url = "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:placeholder"
          EOF

          # Target only the artifact registry repository
          terraform plan -target=module.infrastructure.module.artifact_registry -var-file=terraform.tfvars -out=registry-plan
          terraform apply -auto-approve registry-plan

          echo "✅ Artifact Registry repository ready"

      # Step 2: Determine deployment image
      - name: Determine deployment image
        run: |
          echo "🐳 Determining deployment image..."

          # Generate the same version string as in the build step
          VERSION="$(date -u +%Y.%m.%d)-build${{ github.run_number }}-${GITHUB_SHA:0:7}"

          # Use the specific version for deployment
          IMAGE_TAG="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${VERSION}"

          echo "Using version: $VERSION"
          echo "Using image tag: $IMAGE_TAG"

          # Export for later steps
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "✅ Using image: $IMAGE_TAG"

      # Step 3: Deploy all infrastructure including Cloud Run services
      - name: Deploy Infrastructure and Services
        working-directory: ./infra/environments/${{ env.ENVIRONMENT }}
        run: |
          echo "🏗️ Deploying infrastructure and services..."

          # Initialize Terraform
          terraform init

          # Create terraform.tfvars with all variables including image URLs
          cat > terraform.tfvars << EOF
          project_id = "${{ env.PROJECT_ID }}"
          region = "${{ env.REGION }}"
          zone = "${{ env.REGION }}-b"
          api_image_url = "${{ env.IMAGE_TAG }}"
          scheduler_image_url = "${{ env.IMAGE_TAG }}"
          EOF

          # Plan and apply everything
          terraform plan -var-file=terraform.tfvars -out=tfplan
          terraform apply -auto-approve tfplan

          # Get service URL
          SERVICE_URL=$(terraform output -raw trackrat_api_service_url 2>/dev/null || echo "")
          if [[ -n "$SERVICE_URL" ]]; then
            echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV
          fi

          echo "✅ Infrastructure and services deployed"

      # Step 4: Get final service URL if not set
      - name: Get Service URL
        run: |
          if [[ -z "${{ env.SERVICE_URL }}" ]]; then
            SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
              --region=${{ env.REGION }} \
              --format='value(status.url)' 2>/dev/null || echo "")
            echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV
          fi
          echo "🔗 Service URL: ${{ env.SERVICE_URL }}"

      # Step 5: Health checks
      - name: Health Check
        run: |
          echo "🏥 Performing health check..."

          if [[ -z "${{ env.SERVICE_URL }}" ]]; then
            echo "⚠️ Service URL not available, skipping health check"
            exit 0
          fi

          # Wait a moment for the service to be ready
          sleep 30

          # Check health endpoint
          HEALTH_URL="${{ env.SERVICE_URL }}/health"

          for i in {1..5}; do
            echo "Health check attempt $i/5..."

            if curl -f -s "$HEALTH_URL" > /dev/null; then
              echo "✅ Health check passed!"
              curl -s "$HEALTH_URL" | jq '.' || echo "Health endpoint returned non-JSON response"
              break
            else
              echo "❌ Health check failed, retrying in 30 seconds..."
              if [ $i -eq 5 ]; then
                echo "❌ All health checks failed"
                exit 1
              fi
              sleep 30
            fi
          done

      # Step 6: Test API endpoints
      - name: Test API Endpoints
        run: |
          echo "🧪 Testing API endpoints..."

          if [[ -z "${{ env.SERVICE_URL }}" ]]; then
            echo "⚠️ Service URL not available, skipping API tests"
            exit 0
          fi

          # Test V2 trains endpoint
          TRAINS_URL="${{ env.SERVICE_URL }}/api/v2/trains/departures?from=NY&limit=5"
          echo "Testing: $TRAINS_URL"

          if curl -f -s "$TRAINS_URL" > /dev/null; then
            echo "✅ V2 Trains API endpoint is responding"
          else
            echo "⚠️ V2 Trains API endpoint check failed (may be expected if no data)"
          fi

          # Test health endpoint
          HEALTH_URL="${{ env.SERVICE_URL }}/health"
          echo "Testing: $HEALTH_URL"

          if curl -f -s "$HEALTH_URL" > /dev/null; then
            echo "✅ Health endpoint is responding"
          else
            echo "⚠️ Health endpoint check failed"
          fi

      # Step 7: Deployment summary
      - name: Deployment Summary
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          echo "## 🚀 Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Infrastructure and Application deployed successfully**" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Service URL**: [${{ env.SERVICE_URL }}](${{ env.SERVICE_URL }})" >> $GITHUB_STEP_SUMMARY
          echo "🏥 **Health Check**: [${{ env.SERVICE_URL }}/health](${{ env.SERVICE_URL }}/health)" >> $GITHUB_STEP_SUMMARY
          echo "📊 **API Endpoints**:" >> $GITHUB_STEP_SUMMARY
          echo "- [V2 Trains API](${{ env.SERVICE_URL }}/api/v2/trains/departures?from=NY&limit=5)" >> $GITHUB_STEP_SUMMARY
          echo "- [Health API](${{ env.SERVICE_URL }}/health)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image**: \`${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy Trigger**: ${COMMIT_MESSAGE}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔧 **Next Steps**:" >> $GITHUB_STEP_SUMMARY
          echo "- Start data collection: \`trackcast start-scheduler\`" >> $GITHUB_STEP_SUMMARY
          echo "- Check service logs in [Cloud Run Console](https://console.cloud.google.com/run/detail/${{ env.REGION }}/${{ env.SERVICE_NAME }}/logs?project=${{ env.PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY

  # Deploy to production when production branch is pushed (unchanged workflow)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/production' && needs.test.result == 'success'

    environment:
      name: production
      url: https://prod.api.trackrat.net

    env:
      PROJECT_ID: trackrat-prod
      REPOSITORY: trackcast-inference-prod
      ENVIRONMENT: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Step 1: Ensure Artifact Registry repository exists
      - name: Setup Artifact Registry Repository
        working-directory: ./infra/environments/${{ env.ENVIRONMENT }}
        run: |
          echo "🏗️ Setting up Artifact Registry repository..."

          # Initialize Terraform
          terraform init

          # Create minimal terraform.tfvars for repository setup
          cat > terraform.tfvars << EOF
          project_id = "${{ env.PROJECT_ID }}"
          region = "${{ env.REGION }}"
          zone = "${{ env.REGION }}-b"
          api_image_url = "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:placeholder"
          scheduler_image_url = "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:placeholder"
          EOF

          # Target only the artifact registry repository
          terraform plan -target=module.infrastructure.module.artifact_registry -var-file=terraform.tfvars -out=registry-plan
          terraform apply -auto-approve registry-plan

          echo "✅ Artifact Registry repository ready"

      # Step 2: Determine deployment image
      - name: Determine deployment image
        run: |
          echo "🐳 Determining deployment image..."

          # Generate the same version string as in the build step
          VERSION="$(date -u +%Y.%m.%d)-build${{ github.run_number }}-${GITHUB_SHA:0:7}"

          # Use the specific version for deployment
          IMAGE_TAG="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${VERSION}"

          echo "Using version: $VERSION"
          echo "Using image tag: $IMAGE_TAG"

          # Export for later steps
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "✅ Using image: $IMAGE_TAG"

      # Step 3: Deploy all infrastructure including Cloud Run services
      - name: Deploy Infrastructure and Services
        working-directory: ./infra/environments/${{ env.ENVIRONMENT }}
        run: |
          echo "🏗️ Deploying infrastructure and services..."

          # Initialize Terraform
          terraform init

          # Create terraform.tfvars with all variables including image URLs
          cat > terraform.tfvars << EOF
          project_id = "${{ env.PROJECT_ID }}"
          region = "${{ env.REGION }}"
          zone = "${{ env.REGION }}-b"
          api_image_url = "${{ env.IMAGE_TAG }}"
          scheduler_image_url = "${{ env.IMAGE_TAG }}"
          EOF

          # Plan and apply everything
          terraform plan -var-file=terraform.tfvars -out=tfplan
          terraform apply -auto-approve tfplan

          # Get service URL
          SERVICE_URL=$(terraform output -raw trackrat_api_service_url 2>/dev/null || echo "")
          if [[ -n "$SERVICE_URL" ]]; then
            echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV
          fi

          echo "✅ Infrastructure and services deployed"

      # Step 4: Get final service URL if not set
      - name: Get Service URL
        run: |
          if [[ -z "${{ env.SERVICE_URL }}" ]]; then
            SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
              --region=${{ env.REGION }} \
              --format='value(status.url)' 2>/dev/null || echo "")
            echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV
          fi
          echo "🔗 Service URL: ${{ env.SERVICE_URL }}"

      # Step 5: Health checks
      - name: Health Check
        run: |
          echo "🏥 Performing health check..."

          if [[ -z "${{ env.SERVICE_URL }}" ]]; then
            echo "⚠️ Service URL not available, skipping health check"
            exit 0
          fi

          # Wait a moment for the service to be ready
          sleep 30

          # Check health endpoint
          HEALTH_URL="${{ env.SERVICE_URL }}/health"

          for i in {1..5}; do
            echo "Health check attempt $i/5..."

            if curl -f -s "$HEALTH_URL" > /dev/null; then
              echo "✅ Health check passed!"
              curl -s "$HEALTH_URL" | jq '.' || echo "Health endpoint returned non-JSON response"
              break
            else
              echo "❌ Health check failed, retrying in 30 seconds..."
              if [ $i -eq 5 ]; then
                echo "❌ All health checks failed"
                exit 1
              fi
              sleep 30
            fi
          done

      # Step 6: Test API endpoints
      - name: Test API Endpoints
        run: |
          echo "🧪 Testing API endpoints..."

          if [[ -z "${{ env.SERVICE_URL }}" ]]; then
            echo "⚠️ Service URL not available, skipping API tests"
            exit 0
          fi

          # Test V2 trains endpoint
          TRAINS_URL="${{ env.SERVICE_URL }}/api/v2/trains/departures?from=NY&limit=5"
          echo "Testing: $TRAINS_URL"

          if curl -f -s "$TRAINS_URL" > /dev/null; then
            echo "✅ V2 Trains API endpoint is responding"
          else
            echo "⚠️ V2 Trains API endpoint check failed (may be expected if no data)"
          fi

          # Test health endpoint
          HEALTH_URL="${{ env.SERVICE_URL }}/health"
          echo "Testing: $HEALTH_URL"

          if curl -f -s "$HEALTH_URL" > /dev/null; then
            echo "✅ Health endpoint is responding"
          else
            echo "⚠️ Health endpoint check failed"
          fi

      # Step 7: Deployment summary
      - name: Deployment Summary
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          echo "## 🚀 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Infrastructure and Application deployed successfully**" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Service URL**: [${{ env.SERVICE_URL }}](${{ env.SERVICE_URL }})" >> $GITHUB_STEP_SUMMARY
          echo "🏥 **Health Check**: [${{ env.SERVICE_URL }}/health](${{ env.SERVICE_URL }}/health)" >> $GITHUB_STEP_SUMMARY
          echo "📊 **API Endpoints**:" >> $GITHUB_STEP_SUMMARY
          echo "- [V2 Trains API](${{ env.SERVICE_URL }}/api/v2/trains/departures?from=NY&limit=5)" >> $GITHUB_STEP_SUMMARY
          echo "- [Health API](${{ env.SERVICE_URL }}/health)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image**: \`${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy Trigger**: ${COMMIT_MESSAGE}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔧 **Next Steps**:" >> $GITHUB_STEP_SUMMARY
          echo "- Start data collection: \`trackcast start-scheduler\`" >> $GITHUB_STEP_SUMMARY
          echo "- Check service logs in [Cloud Run Console](https://console.cloud.google.com/run/detail/${{ env.REGION }}/${{ env.SERVICE_NAME }}/logs?project=${{ env.PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY

  # Summary job - always runs
  summary:
    runs-on: ubuntu-latest
    needs: [test, deploy-staging, deploy-production]
    if: always()
    name: Pipeline Summary

    steps:
      - name: Generate pipeline summary
        run: |
          echo "## 🚀 CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status based on new job structure
          if [[ "${{ needs.deploy-staging.result }}" == "success" || "${{ needs.deploy-production.result }}" == "success" ]]; then
            echo "✅ **Pipeline Status**: Deployment Successful" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.deploy-staging.result }}" == "skipped" && "${{ needs.deploy-production.result }}" == "skipped" ]]; then
            echo "🟡 **Pipeline Status**: Tests Completed (No Deployment - Not Main/Production Branch or Tests Failed)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Pipeline Status**: Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Result**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Staging Deploy**: ${{ needs.deploy-staging.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Production Deploy**: ${{ needs.deploy-production.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
