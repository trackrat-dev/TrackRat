name: CI/CD Pipeline

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main, staging, production]
  pull_request:
    branches: [main, staging, production]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  TF_VERSION: '1.7.0'
  TFLINT_VERSION: 'v0.50.0'
  # Dynamic environment variables based on branch
  PROJECT_ID: ${{ github.ref == 'refs/heads/main' && 'trackrat-dev' || github.ref == 'refs/heads/staging' && 'trackrat-staging' || 'trackrat-prod' }}
  REGION: us-central1
  SERVICE_NAME: trackcast-inference
  REPOSITORY: ${{ github.ref == 'refs/heads/main' && 'trackcast-inference-dev' || github.ref == 'refs/heads/staging' && 'trackcast-inference-staging' || 'trackcast-inference-prod' }}
  ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'dev' || github.ref == 'refs/heads/staging' && 'staging' || 'prod' }}

jobs:
  # Simplified CI/CD: Run all tests unconditionally
  test:
    runs-on: ubuntu-latest
    name: Test All Components

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trackcast_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Setup
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend Tests
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-backend-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-backend-
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          echo "💾 Disk space before venv creation:"
          df -h
          python -m pip install --upgrade pip
          echo "🏗️ Creating temporary virtual environment for CI tests..."
          python -m venv ci-venv
          source ci-venv/bin/activate
          echo "📦 Installing CPU-only dependencies..."
          # Install PyTorch CPU-only first to avoid CUDA dependencies (~2GB savings)
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-production.txt
          pip install -r requirements-cpu.txt  # also needed for black and other tools
          pip install -e .
          echo "📦 Virtual environment created at: $(pwd)/ci-venv"
          echo "📊 Virtual environment size: $(du -sh ci-venv)"

      - name: Run backend code quality checks
        working-directory: ./backend
        run: |
          source ci-venv/bin/activate
          echo "🎨 Checking code formatting..."
          black --check trackcast/
          echo "🔍 Running linting checks..."
          flake8 --ignore F541,E712,F841,E203,E711,W503,F401,W291,E501 trackcast/

      - name: Run backend tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trackcast_test
        run: |
          source ci-venv/bin/activate
          echo "🧪 Running unit tests..."
          pytest tests/unit/ -v --tb=short
          echo "🔗 Running integration tests..."
          pytest tests/integration/ -v --tb=short

      # Docker Build
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.0

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:cache
          cache-to: type=registry,ref=us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:cache,mode=max
          platforms: linux/amd64
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            DEBIAN_FRONTEND=noninteractive
          provenance: false
          sbom: false

      # Infrastructure Tests
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}

      - name: Cache Terraform plugins
        uses: actions/cache@v3
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('infra/**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Terraform validation and linting
        working-directory: ./infra
        run: |
          echo "🔧 Running Terraform format check..."
          terraform fmt -check -recursive
          echo "🔧 Running Terraform validation..."
          terraform init -backend=false
          terraform validate
          # Validate modules
          for module_dir in modules/*/; do
            if [ -d "$module_dir" ]; then
              echo "Validating module: $module_dir"
              (cd "$module_dir" && terraform init -backend=false && terraform validate)
            fi
          done
          # Validate environments
          for env_dir in environments/*/; do
            if [ -d "$env_dir" ]; then
              echo "Validating environment: $env_dir"
              (cd "$env_dir" && terraform init -backend=false && terraform validate)
            fi
          done
          echo "🔧 Running TFLint..."
          tflint --init
          tflint
          for module_dir in modules/*/; do
            if [ -d "$module_dir" ]; then
              tflint --chdir="$module_dir"
            fi
          done
          for env_dir in environments/*/; do
            if [ -d "$env_dir" ]; then
              tflint --chdir="$env_dir"
            fi
          done

      # Workflow Validation
      - name: Install yamllint
        run: pip install yamllint

      - name: Validate workflow YAML syntax
        run: |
          echo "🔍 Validating GitHub workflow YAML files..."
          yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable}}' .github/workflows/
          echo "✅ All workflow files have valid YAML syntax"

  # Deploy when tests pass and on main, staging, or production branch
  deploy:
    name: Deploy to ${{ github.ref == 'refs/heads/main' && 'Development' || github.ref == 'refs/heads/staging' && 'Staging' || 'Production' }}
    runs-on: ubuntu-latest
    needs: [test]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/production') && needs.test.result == 'success'

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'development' || github.ref == 'refs/heads/staging' && 'staging' || 'production' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://dev.api.trackrat.net' || github.ref == 'refs/heads/staging' && 'https://staging.api.trackrat.net' || 'https://prod.api.trackrat.net' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Step 1: Ensure Artifact Registry repository exists
      - name: Setup Artifact Registry Repository
        working-directory: ./infra/environments/${{ env.ENVIRONMENT }}
        run: |
          echo "🏗️ Setting up Artifact Registry repository..."

          # Initialize Terraform
          terraform init

          # Create minimal terraform.tfvars for repository setup
          cat > terraform.tfvars << EOF
          project_id = "${{ env.PROJECT_ID }}"
          region = "${{ env.REGION }}"
          zone = "${{ env.REGION }}-b"
          api_image_url = "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:placeholder"
          scheduler_image_url = "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:placeholder"
          EOF

          # Target only the artifact registry repository
          terraform plan -target=module.infrastructure.module.artifact_registry -var-file=terraform.tfvars -out=registry-plan
          terraform apply -auto-approve registry-plan

          echo "✅ Artifact Registry repository ready"

      # Step 2: Determine deployment image
      - name: Determine deployment image
        run: |
          echo "🐳 Determining deployment image..."

          # Define image tag - always use latest for deployment
          IMAGE_TAG="us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:latest"

          # For backend changes, the image was already built and pushed with latest tag
          # For infrastructure-only changes, use the existing latest image
          echo "Using image tag: $IMAGE_TAG"

          # Export for later steps
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "✅ Using image: $IMAGE_TAG"

      # Step 3: Deploy all infrastructure including Cloud Run services
      - name: Deploy Infrastructure and Services
        working-directory: ./infra/environments/${{ env.ENVIRONMENT }}
        run: |
          echo "🏗️ Deploying infrastructure and services..."

          # Initialize Terraform
          terraform init

          # Create terraform.tfvars with all variables including image URLs
          cat > terraform.tfvars << EOF
          project_id = "${{ env.PROJECT_ID }}"
          region = "${{ env.REGION }}"
          zone = "${{ env.REGION }}-b"
          api_image_url = "${{ env.IMAGE_TAG }}"
          scheduler_image_url = "${{ env.IMAGE_TAG }}"
          EOF

          # Plan and apply everything
          terraform plan -var-file=terraform.tfvars -out=tfplan
          terraform apply -auto-approve tfplan

          # Get service URL
          SERVICE_URL=$(terraform output -raw trackrat_api_service_url 2>/dev/null || echo "")
          if [[ -n "$SERVICE_URL" ]]; then
            echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV
          fi


          echo "✅ Infrastructure and services deployed"


      # Step 4: Get final service URL if not set
      - name: Get Service URL
        run: |
          if [[ -z "${{ env.SERVICE_URL }}" ]]; then
            SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
              --region=${{ env.REGION }} \
              --format='value(status.url)' 2>/dev/null || echo "")
            echo "SERVICE_URL=$SERVICE_URL" >> $GITHUB_ENV
          fi
          echo "🔗 Service URL: ${{ env.SERVICE_URL }}"

      # Step 5: Health checks
      - name: Health Check
        run: |
          echo "🏥 Performing health check..."

          if [[ -z "${{ env.SERVICE_URL }}" ]]; then
            echo "⚠️ Service URL not available, skipping health check"
            exit 0
          fi

          # Wait a moment for the service to be ready
          sleep 30

          # Check health endpoint
          HEALTH_URL="${{ env.SERVICE_URL }}/health"

          for i in {1..5}; do
            echo "Health check attempt $i/5..."

            if curl -f -s "$HEALTH_URL" > /dev/null; then
              echo "✅ Health check passed!"
              curl -s "$HEALTH_URL" | jq '.' || echo "Health endpoint returned non-JSON response"
              break
            else
              echo "❌ Health check failed, retrying in 30 seconds..."
              if [ $i -eq 5 ]; then
                echo "❌ All health checks failed"
                exit 1
              fi
              sleep 30
            fi
          done

      # Step 6: Test API endpoints
      - name: Test API Endpoints
        run: |
          echo "🧪 Testing API endpoints..."

          if [[ -z "${{ env.SERVICE_URL }}" ]]; then
            echo "⚠️ Service URL not available, skipping API tests"
            exit 0
          fi

          # Test trains endpoint
          TRAINS_URL="${{ env.SERVICE_URL }}/api/trains/?limit=5"
          echo "Testing: $TRAINS_URL"

          if curl -f -s "$TRAINS_URL" > /dev/null; then
            echo "✅ Trains API endpoint is responding"
          else
            echo "⚠️ Trains API endpoint check failed (may be expected if no data)"
          fi

          # Test stops endpoint
          STOPS_URL="${{ env.SERVICE_URL }}/api/stops/"
          echo "Testing: $STOPS_URL"

          if curl -f -s "$STOPS_URL" > /dev/null; then
            echo "✅ Stops API endpoint is responding"
          else
            echo "⚠️ Stops API endpoint check failed (may be expected if no data)"
          fi

      # Step 7: Deployment summary
      - name: Deployment Summary
        run: |
          echo "## 🚀 ${{ env.ENVIRONMENT == 'dev' && 'Development' || env.ENVIRONMENT == 'staging' && 'Staging' || 'Production' }} Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Infrastructure and Application deployed successfully**" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Service URL**: [${{ env.SERVICE_URL }}](${{ env.SERVICE_URL }})" >> $GITHUB_STEP_SUMMARY
          echo "🏥 **Health Check**: [${{ env.SERVICE_URL }}/health](${{ env.SERVICE_URL }}/health)" >> $GITHUB_STEP_SUMMARY
          echo "📊 **API Endpoints**:" >> $GITHUB_STEP_SUMMARY
          echo "- [Trains API](${{ env.SERVICE_URL }}/api/trains/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Stops API](${{ env.SERVICE_URL }}/api/stops/)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Strategy**: Always Latest" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image**: \`${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy Trigger**: ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔧 **Next Steps**:" >> $GITHUB_STEP_SUMMARY
          echo "- Start data collection: \`trackcast start-scheduler\`" >> $GITHUB_STEP_SUMMARY
          echo "- Check service logs in [Cloud Run Console](https://console.cloud.google.com/run/detail/${{ env.REGION }}/${{ env.SERVICE_NAME }}/logs?project=${{ env.PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY

  # Summary job - always runs
  summary:
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()
    name: Pipeline Summary

    steps:
      - name: Generate pipeline summary
        run: |
          echo "## 🚀 CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "✅ **Pipeline Status**: Deployment Successful" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.deploy.result }}" == "skipped" ]]; then
            echo "🟡 **Pipeline Status**: Tests Completed (No Deployment - Not Main/Staging/Production Branch or Tests Failed)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Pipeline Status**: Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Result**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deploy Result**: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Time**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
