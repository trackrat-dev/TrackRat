name: Docker Build Test

on:
  push:
    branches: [ main, develop, infra-ops-* ]
    paths:
      - 'backend/Dockerfile'
      - 'backend/requirements-inference.txt'
      - 'backend/trackcast/**'
      - '.github/workflows/docker-build-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/Dockerfile'
      - 'backend/requirements-inference.txt'
      - 'backend/trackcast/**'
      - '.github/workflows/docker-build-test.yml'

# Allow manual workflow dispatch
workflow_dispatch:

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    name: Test Docker Container Build
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: |
          image=moby/buildkit:v0.12.0

    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-docker-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-docker-buildx-

    - name: Build inference container
      id: build
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        target: runtime
        push: false
        load: true
        tags: |
          trackcast-inference:ci-test
          trackcast-inference:${{ github.sha }}
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1

    - name: Verify container structure
      run: |
        echo "🔍 Verifying built container..."
        
        # Check that the image was created
        docker images trackcast-inference:ci-test
        
        # Check image size (should be reasonable for inference-only)
        SIZE=$(docker images trackcast-inference:ci-test --format "table {{.Size}}" | tail -n 1)
        echo "📦 Image size: $SIZE"
        
        # Verify container structure and key files
        echo "🔍 Checking container filesystem..."
        docker run --rm trackcast-inference:ci-test ls -la /app/
        
        # Verify Python packages are installed
        echo "🐍 Checking Python environment..."
        docker run --rm trackcast-inference:ci-test python --version
        docker run --rm trackcast-inference:ci-test pip list | head -20

    - name: Test container startup validation
      run: |
        echo "🚀 Testing container can start and import modules..."
        
        # Test basic imports without external dependencies
        docker run --rm \
          -e MODEL_PATH="/app/models" \
          -e TRACKCAST_ENV="ci" \
          trackcast-inference:ci-test \
          python -c "
import sys
print(f'Python version: {sys.version}')

# Test critical imports
try:
    import fastapi
    print('✅ FastAPI imported')
    
    import uvicorn
    print('✅ Uvicorn imported')
    
    import torch
    print('✅ PyTorch imported')
    
    import sqlalchemy
    print('✅ SQLAlchemy imported')
    
    import pandas
    print('✅ Pandas imported')
    
    # Test app can be imported
    from trackcast.api.app import app
    print('✅ TrackCast app imported')
    
    # Check that key routes exist
    routes = [route.path for route in app.routes if hasattr(route, 'path')]
    expected_routes = ['/', '/health']
    for route in expected_routes:
        if route in routes:
            print(f'✅ Route {route} found')
        else:
            print(f'❌ Route {route} missing')
            sys.exit(1)
    
    print('🎉 All validations passed!')
    
except ImportError as e:
    print(f'❌ Import error: {e}')
    sys.exit(1)
except Exception as e:
    print(f'❌ Validation error: {e}')
    sys.exit(1)
"

    - name: Test CLI access
      run: |
        echo "🔧 Testing CLI tool access..."
        
        # Test that trackcast CLI is available
        docker run --rm trackcast-inference:ci-test which trackcast
        
        # Test CLI help (should work without database)
        docker run --rm trackcast-inference:ci-test trackcast --help

    - name: Test container security
      run: |
        echo "🔒 Checking container security..."
        
        # Verify running as non-root user
        USER_CHECK=$(docker run --rm trackcast-inference:ci-test whoami)
        if [ "$USER_CHECK" = "trackcast" ]; then
          echo "✅ Container runs as non-root user: $USER_CHECK"
        else
          echo "❌ Container should run as 'trackcast' user, but runs as: $USER_CHECK"
          exit 1
        fi
        
        # Check key directories exist with correct permissions
        docker run --rm trackcast-inference:ci-test ls -la /app/models/
        echo "✅ Models directory exists"

    - name: Test health check endpoint structure
      run: |
        echo "🏥 Testing health check endpoint (structure only)..."
        
        # We can't test the full health endpoint without database,
        # but we can verify the endpoint exists and has the right structure
        docker run --rm \
          -e MODEL_PATH="/app/models" \
          trackcast-inference:ci-test \
          python -c "
import sys
try:
    from trackcast.api.app import app
    from fastapi.testclient import TestClient
    
    # This will fail due to missing database, but we can catch
    # the specific error to verify the endpoint exists
    client = TestClient(app)
    
    # The health endpoint should exist in the app routes
    health_route_found = False
    for route in app.routes:
        if hasattr(route, 'path') and route.path == '/health':
            health_route_found = True
            break
    
    if health_route_found:
        print('✅ Health check endpoint found in routes')
    else:
        print('❌ Health check endpoint not found')
        sys.exit(1)
        
except Exception as e:
    print(f'Health check structure test completed with expected database error: {e}')
    print('✅ This is expected in CI without database')
"

    - name: Update cache
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache

    - name: Build summary
      run: |
        echo "## 🎉 Docker Build Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Container built successfully**" >> $GITHUB_STEP_SUMMARY
        echo "✅ **All module imports working**" >> $GITHUB_STEP_SUMMARY  
        echo "✅ **Security checks passed**" >> $GITHUB_STEP_SUMMARY
        echo "✅ **CLI tool accessible**" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Health endpoint structure verified**" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The TrackCast inference container is ready for deployment! 🚀" >> $GITHUB_STEP_SUMMARY