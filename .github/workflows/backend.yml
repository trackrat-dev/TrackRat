name: Backend Tests
on: [push]
jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run backend tests
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -e .
          ./tests/run_all_tests.sh
