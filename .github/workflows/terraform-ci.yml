env:
  TF_VERSION: '1.7.0'
  TFLINT_VERSION: 'v0.50.0'
  CHECKOV_VERSION: '3.2.0'

name: Terraform CI/CD
on: [push]
jobs:
  terraform-lint-and-test:
    name: Terraform Lint and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: ${{ env.TFLINT_VERSION }}

    - name: Install terraform-docs
      run: |
        curl -sSLo ./terraform-docs.tar.gz https://terraform-docs.io/dl/v0.17.0/terraform-docs-v0.17.0-$(uname)-amd64.tar.gz
        tar -xzf terraform-docs.tar.gz
        chmod +x terraform-docs
        sudo mv terraform-docs /usr/local/bin/

    - name: Cache Terraform plugins
      uses: actions/cache@v3
      with:
        path: ~/.terraform.d/plugin-cache
        key: ${{ runner.os }}-terraform-${{ hashFiles('infra/**/.terraform.lock.hcl') }}
        restore-keys: |
          ${{ runner.os }}-terraform-

    - name: Run comprehensive lint and test
      working-directory: ./infra
      run: ./lint-and-test.sh

    - name: Terraform Format Check
      working-directory: ./infra
      run: |
        terraform fmt -check -recursive
        if [ $? -ne 0 ]; then
          echo "❌ Terraform files are not properly formatted"
          echo "Run 'terraform fmt -recursive' to fix formatting"
          exit 1
        fi
        echo "✅ All Terraform files are properly formatted"

    - name: Terraform Validate
      working-directory: ./infra
      run: |
        # Initialize and validate root module
        terraform init -backend=false
        terraform validate
        
        # Validate each module
        for module_dir in modules/*/; do
          if [ -d "$module_dir" ]; then
            echo "Validating module: $module_dir"
            (cd "$module_dir" && terraform init -backend=false && terraform validate)
          fi
        done
        
        # Validate each environment
        for env_dir in environments/*/; do
          if [ -d "$env_dir" ]; then
            echo "Validating environment: $env_dir"
            (cd "$env_dir" && terraform init -backend=false && terraform validate)
          fi
        done

    - name: Initialize TFLint
      working-directory: ./infra
      run: tflint --init

    - name: Run TFLint
      working-directory: ./infra
      run: |
        # Run tflint on root module
        tflint
        
        # Run tflint on each module
        for module_dir in modules/*/; do
          if [ -d "$module_dir" ]; then
            echo "Running tflint on module: $module_dir"
            tflint --chdir="$module_dir"
          fi
        done
        
        # Run tflint on each environment
        for env_dir in environments/*/; do
          if [ -d "$env_dir" ]; then
            echo "Running tflint on environment: $env_dir"
            tflint --chdir="$env_dir"
          fi
        done
