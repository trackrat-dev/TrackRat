# Cloud Build configuration for TrackCast inference service
# Builds and pushes Docker images to Artifact Registry

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/trackcast-inference:${_IMAGE_TAG}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/trackcast-inference:latest'
      - '--target'
      - 'runtime'
      - '.'
    dir: 'backend'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/trackcast-inference'
    waitFor: ['build-image']

  # Step 3: Run security scan (optional but recommended)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'security-scan'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "Triggering vulnerability scan..."
        gcloud artifacts docker images scan \
          ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/trackcast-inference:${_IMAGE_TAG} \
          --location=${_REGION} \
          --async
    waitFor: ['push-image']

# Build configuration options
options:
  machineType: 'E2_HIGHCPU_8'  # Faster builds
  substitutionOption: 'ALLOW_LOOSE'  # Allow undefined substitutions
  logging: CLOUD_LOGGING_ONLY

# Build timeout
timeout: '1200s'  # 20 minutes

# Substitution variables with defaults
substitutions:
  _REGION: 'us-central1'
  _REPOSITORY: 'trackcast-inference-${_ENV}'
  _ENV: 'dev'
  _IMAGE_TAG: '${_ENV}-${SHORT_SHA}-${BUILD_ID}'

# Images to store in build results
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/trackcast-inference:${_IMAGE_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/trackcast-inference:latest'

# Available trigger substitutions:
# _ENV: Environment (dev, staging, prod)
# _REGION: GCP region for Artifact Registry
# _REPOSITORY: Repository name (will be trackcast-inference-{env})
# 
# Usage examples:
# For dev environment:
#   gcloud builds submit --config cloudbuild.yaml --substitutions _ENV=dev
# For staging:
#   gcloud builds submit --config cloudbuild.yaml --substitutions _ENV=staging
# For production:
#   gcloud builds submit --config cloudbuild.yaml --substitutions _ENV=prod