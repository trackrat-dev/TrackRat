# API Configuration
njtransit_api:
  # Base URL for NJ Transit's real-time train data API
  base_url: "https://raildata.njtransit.com/api/TrainData"
  
  # List of stations to collect data from
  # Each station must have a code, name, and enabled flag
  stations:
    - code: "NY"
      name: "New York Penn Station"
      enabled: true  # Set to false to skip this station
    - code: "TR"
      name: "Trenton Transit Center"
      enabled: true
    - code: "PJ"
      name: "Princeton Junction"
      enabled: true
    - code: "MP"
      name: "Metropark"
      enabled: true
    - code: "NP"
      name: "Newark Penn Station"
      enabled: true
  
  # DEPRECATED: Not used - scheduler has its own intervals
  polling_interval_seconds: 60
  
  # Number of retry attempts for failed API requests
  retry_attempts: 3
  
  # HTTP request timeout in seconds
  timeout_seconds: 10
  
  # API credentials - typically overridden by environment variables
  username: ""  # Set via NJT_USERNAME env var
  password: ""  # Set via NJT_PASSWORD env var
  
  # DEPRECATED: Not used in code
  debug_mode: false

amtrak_api:
  # Base URL for Amtrak's real-time train tracking API (via Amtraker)
  base_url: "https://api-v3.amtraker.com/v3/trains"
  
  # Whether to enable Amtrak data collection
  enabled: true
  
  # DEPRECATED: Not used - scheduler has its own intervals
  polling_interval_seconds: 120  # Slightly longer interval than NJ Transit
  
  # Number of retry attempts for failed API requests
  retry_attempts: 3
  
  # HTTP request timeout in seconds
  timeout_seconds: 15
  
  # Enable debug logging for Amtrak collector
  debug_mode: true

# Database Configuration
database:
  # PostgreSQL connection URL - can be overridden by DATABASE_URL env var
  url: "postgresql://andy@localhost:5432/trackcast_dev"
  
  # Number of persistent connections to maintain in the pool
  pool_size: 10
  
  # Maximum overflow connections above pool_size
  # Total max connections = pool_size + max_overflow = 35
  max_overflow: 25

# Scheduler Configuration
scheduler:
  # How often to collect new train data from APIs (in minutes)
  collection_interval_minutes: 1
  
  # How often to process features from collected train data (in minutes)
  feature_engineering_interval_minutes: 1
  
  # How often to generate track predictions using ML models (in minutes)
  prediction_interval_minutes: 2

# Model Configuration
model:
  # Model version identifier - used for tracking and loading models
  version: "1.0.0"
  
  # Directory where trained models are saved/loaded from
  # Can be overridden by MODEL_PATH env var
  save_path: "models/"
  
  # Type of model to use for predictions
  type: "pytorch"  # Options: "pytorch" or "xgboost"
  
  # DEPRECATED: Not used - models have their own hyperparameter handling
  hyperparameters:
    learning_rate: 0.001
    hidden_layers: [128, 64, 32]
    dropout_rate: 0.3
    batch_size: 64
    num_epochs: 50

# DEPRECATED: Timezone configuration is not used in the code
# All times are handled in Eastern Time by default
timezone:
  display_timezone: "US/Eastern"
  storage_timezone: "US/Eastern"
  api_response_timezone: "US/Eastern"

