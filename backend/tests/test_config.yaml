# Test Configuration for TrackCast
# Used by unit tests to ensure they run with an in-memory SQLite database
# instead of requiring a PostgreSQL server connection.
#
# IMPORTANT: DO NOT change the database.url setting unless you have a specific
# reason - this should remain as sqlite:///:memory: for regular unit tests.

database:
  url: "sqlite:///:memory:"
  echo: false

api:
  host: "127.0.0.1"
  port: 8000

njtransit:
  api_url: "https://test-api.example.com"
  poll_interval: 60

features:
  version: "test"

model:
  version: "test"
  save_path: "/tmp/trackcast_test_models"
  type: "pytorch"
  hyperparameters:
    hidden_layers: [128, 64, 32]
    learning_rate: 0.001
    batch_size: 32
    num_epochs: 50
    dropout_rate: 0.3