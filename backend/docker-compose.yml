# Docker Compose for TrackCast Inference Service
# Provides local development environment with database and service

version: '3.8'

services:
  # PostgreSQL database for local development
  postgres:
    image: postgres:15-alpine
    container_name: trackcast-postgres
    environment:
      POSTGRES_DB: trackcast_dev
      POSTGRES_USER: trackcast
      POSTGRES_PASSWORD: trackcast_dev_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackcast -d trackcast_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trackcast-network

  # TrackCast inference service
  trackcast-inference:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: trackcast-inference
    ports:
      - "8000:8000"
    environment:
      # Database configuration
      DATABASE_URL: "postgresql://trackcast:trackcast_dev_password@postgres:5432/trackcast_dev"
      
      # Model configuration
      MODEL_PATH: "/app/models"
      TRACKCAST_ENV: "dev"
      
      # API credentials (set these in .env file)
      NJT_USERNAME: "${NJT_USERNAME:-}"
      NJT_PASSWORD: "${NJT_PASSWORD:-}"
      
      # Logging
      PYTHONUNBUFFERED: "1"
    volumes:
      # Mount external models directory
      - ./models-volume:/app/models:ro
      
      # Optional: Mount config directory
      - ./config:/app/config:ro
      
      # Optional: Mount logs directory
      - ./logs:/app/logs
      
      # Development: Uncomment to mount source code for live reload
      # - ./trackcast:/app/trackcast
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - trackcast-network
    restart: unless-stopped

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: trackcast-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@trackcast.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - trackcast-network
    profiles:
      - tools  # Only start with --profile tools

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  trackcast-network:
    driver: bridge

# Usage examples:
#
# Start core services (database + inference):
#   docker-compose up -d
#
# Start with pgAdmin for database management:
#   docker-compose --profile tools up -d
#
# View logs:
#   docker-compose logs -f trackcast-inference
#
# Stop all services:
#   docker-compose down
#
# Rebuild inference service:
#   docker-compose build trackcast-inference && docker-compose up -d trackcast-inference