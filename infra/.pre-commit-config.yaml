# Pre-commit hooks for TrackRat infrastructure
# Install with: pip install pre-commit && pre-commit install
# Run manually with: pre-commit run --all-files

repos:
  # Terraform hooks
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.88.4
    hooks:
      - id: terraform_fmt
        name: Terraform format
        description: Rewrites all Terraform configuration files to a canonical format
        entry: terraform_fmt
        language: system
        files: (\.tf|\.tfvars)$
        exclude: \.terraform/.*$

      - id: terraform_validate
        name: Terraform validate
        description: Validates all Terraform configuration files
        entry: terraform_validate
        language: system
        files: (\.tf|\.tfvars)$
        exclude: \.terraform/.*$

      - id: terraform_docs
        name: Terraform docs
        description: Inserts input and output documentation into README.md
        entry: terraform_docs
        language: system
        files: (\.tf|\.tfvars)$
        exclude: \.terraform/.*$
        args:
          - --hook-config=--path-to-file=README.md
          - --hook-config=--add-to-existing-file=true
          - --hook-config=--create-file-if-not-exist=true

      - id: terraform_tflint
        name: Terraform lint
        description: Validates all Terraform configuration files with TFLint
        entry: terraform_tflint
        language: system
        files: (\.tf|\.tfvars)$
        exclude: \.terraform/.*$
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl

      - id: terraform_checkov
        name: Terraform security scan
        description: Runs checkov on Terraform files
        entry: terraform_checkov
        language: system
        files: (\.tf|\.tfvars)$
        exclude: \.terraform/.*$
        args:
          - --args=--quiet
          - --args=--framework=terraform

  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        description: Trims trailing whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]

      - id: end-of-file-fixer
        name: Fix end of files
        description: Makes sure files end with a newline and only a newline
        entry: end-of-file-fixer
        language: system
        types: [text]

      - id: check-merge-conflict
        name: Check for merge conflicts
        description: Checks for files that contain merge conflict strings
        entry: check-merge-conflict
        language: system
        types: [text]

      - id: check-yaml
        name: Check YAML
        description: Attempts to load all yaml files to verify syntax
        entry: check-yaml
        language: system
        types: [yaml]

      - id: check-json
        name: Check JSON
        description: Attempts to load all json files to verify syntax
        entry: check-json
        language: system
        types: [json]

      - id: mixed-line-ending
        name: Mixed line ending
        description: Replaces or checks mixed line endings
        entry: mixed-line-ending
        language: system
        types: [text]

  # Shell script hooks
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        name: Shellcheck
        description: Shell script analysis tool
        entry: shellcheck
        language: system
        types: [shell]
        args: [-e, SC1091]  # Ignore sourced files that don't exist

# CI/CD integration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false