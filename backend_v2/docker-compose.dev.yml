version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: trackratdb
      POSTGRES_USER: trackratuser
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackratuser -d trackratdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: