version: '3.8'

services:
  trackrat-backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Database
      TRACKRAT_DATABASE_URL: "sqlite+aiosqlite:///trackrat.db"

      # NJ Transit API (required)
      TRACKRAT_NJT_API_TOKEN: "${NJT_API_TOKEN}"

      # APNS Configuration (optional - for iOS push notifications)
      APNS_TEAM_ID: "${APNS_TEAM_ID:-}"
      APNS_KEY_ID: "${APNS_KEY_ID:-}"
      APNS_BUNDLE_ID: "${APNS_BUNDLE_ID:-net.trackrat.TrackRat}"
      APNS_AUTH_KEY_PATH: "${APNS_AUTH_KEY_PATH:-}"
      APNS_ENVIRONMENT: "dev"

      # Application Settings
      TRACKRAT_ENVIRONMENT: "production"
      TRACKRAT_LOG_LEVEL: "INFO"
      TRACKRAT_DISCOVERY_INTERVAL_MINUTES: 5
      TRACKRAT_JOURNEY_UPDATE_INTERVAL_MINUTES: 10

    volumes:
      # Mount directory containing APNS P8 certificate (if using push notifications)
      - ./certs:/app/certs:ro

      # Mount directory for SQLite database persistence
      - ./data:/app/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Example usage:
# 1. Copy this file to docker-compose.yml
# 2. Create a .env file with your credentials:
#    NJT_API_TOKEN=your_nj_transit_token
#
# 3. (Optional) For iOS push notifications, add to .env:
#    APNS_TEAM_ID=your_team_id
#    APNS_KEY_ID=your_key_id
#    APNS_AUTH_KEY_PATH=certs/apns_auth_key.p8
#    Then place your .p8 file in ./certs/apns_auth_key.p8
#
# 4. Create ./data directory for database persistence
# 5. Run: docker-compose up -d
