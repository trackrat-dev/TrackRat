# TrackRat V2 Docker Compose Configuration
# Used for deployment on GCP Managed Instance Group with persistent disk
#
# Required environment variables (set in .env or passed from startup script):
#   DATA_DIR       - Path to persistent disk mount (e.g., /mnt/disks/data)
#   IMAGE_URL      - Full Artifact Registry URL for trackrat image
#   DB_PASSWORD    - PostgreSQL password (from Secret Manager)
#   NJT_API_TOKEN  - NJ Transit API token (from Secret Manager)
#   APNS_TEAM_ID, APNS_KEY_ID, APNS_BUNDLE_ID, APNS_ENVIRONMENT - APNS config
#
# Optional (Cloudflare Tunnel — replaces the Google load balancer as the API's
# front door so no global forwarding rule is billed):
#   COMPOSE_PROFILES=tunnel   - activates the cloudflared service below
#   CLOUDFLARE_TUNNEL_TOKEN   - remotely-managed tunnel token (from Secret Manager)
# Both are set by the startup script only when the tunnel-token secret exists.

services:
  db:
    image: postgres:17-alpine
    container_name: trackrat-postgres
    # /dev/shm holds parallel-worker DSM segments. Docker's 64MB default exhausts
    # quickly under concurrent parallel queries against journey_stops, surfacing as
    # asyncpg DiskFullError on predict_track / operations_summary (issue #1232).
    shm_size: '1gb'
    command:
      - postgres
      - -c
      - max_wal_size=512MB
      - -c
      - min_wal_size=64MB
      - -c
      - wal_keep_size=0
      # Cap parallel-worker fan-out per query: each worker grabs its own DSM
      # segment, so reducing the cap directly attacks the /dev/shm pressure that
      # the larger pool above is also defending against (issue #1232).
      - -c
      - max_parallel_workers_per_gather=1
    volumes:
      - ${DATA_DIR}/pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: trackrat
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: trackrat
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackrat -d trackrat"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - trackrat

  api:
    image: ${IMAGE_URL}
    container_name: trackrat-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Database
      TRACKRAT_DATABASE_URL: postgresql+asyncpg://trackrat:${DB_PASSWORD}@db:5432/trackrat
      TRACKRAT_ENVIRONMENT: ${TRACKRAT_ENVIRONMENT:-production}
      TRACKRAT_LOG_LEVEL: ${TRACKRAT_LOG_LEVEL:-INFO}
      # Feature flags (issue #1484: must be passed through or the container never sees it)
      TRACKRAT_DISABLED_DATA_SOURCES: ${TRACKRAT_DISABLED_DATA_SOURCES:-}
      # NJ Transit API
      TRACKRAT_NJT_API_TOKEN: ${NJT_API_TOKEN}
      # WMATA API
      TRACKRAT_WMATA_API_KEY: ${TRACKRAT_WMATA_API_KEY:-}
      # Metra API
      TRACKRAT_METRA_API_TOKEN: ${TRACKRAT_METRA_API_TOKEN:-}
      # APNS Configuration
      APNS_TEAM_ID: ${APNS_TEAM_ID}
      APNS_KEY_ID: ${APNS_KEY_ID}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID}
      APNS_ENVIRONMENT: ${APNS_ENVIRONMENT:-prod}
      APNS_AUTH_KEY_PATH: ${APNS_AUTH_KEY_PATH:-}
      # Resource monitoring - mount path must match the volume below (issue #1344)
      TRACKRAT_DATA_DISK_PATH: ${DATA_DIR:-/mnt/disks/data}
    volumes:
      - ${DATA_DIR:-./}/compose/apns_auth_key.p8:/app/certs/apns_auth_key.p8:ro
      # Read-only so the API can report data-disk usage without write access (issue #1344)
      - ${DATA_DIR:-/mnt/disks/data}:${DATA_DIR:-/mnt/disks/data}:ro
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - trackrat

  # Cloudflare Tunnel connector. Dormant unless the "tunnel" compose profile is
  # active (the startup script sets COMPOSE_PROFILES=tunnel + CLOUDFLARE_TUNNEL_TOKEN
  # only when the tunnel-token secret is present). When active, Cloudflare terminates
  # TLS at its edge and routes the API hostname to http://api:8000 over this private
  # network, so the API needs no Google load balancer or global forwarding rule.
  cloudflared:
    image: cloudflare/cloudflared:2026.7.1
    container_name: trackrat-cloudflared
    profiles: ["tunnel"]
    # Pass the token via the TUNNEL_TOKEN env var, NOT a --token flag on a string
    # command. docker-compose parses a string `command:` with shell-word splitting,
    # and a real tunnel token interpolated inline trips that parser
    # ("invalid command line string"), which aborts the WHOLE compose file — so
    # `pull`/`up` fail and the MIG startup script crash-loops (staging outage
    # 2026-07-19; production was spared only because it has no tunnel token, so the
    # value interpolated to empty and parsed). cloudflared reads TUNNEL_TOKEN for
    # `tunnel run`; the env var never goes through shell-word splitting and keeps
    # the secret out of the process arg list.
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - trackrat

networks:
  trackrat:
    driver: bridge
