<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackRat - Train Sharing</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            margin: 0 0 20px 0;
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .train-info {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .train-id {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffa500;
        }
        
        .route {
            margin: 10px 0;
            font-size: 1.1rem;
        }
        
        .download-btn {
            display: inline-block;
            background: #ffa500;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 20px 10px;
            transition: transform 0.2s;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
        }
        
        .subtitle {
            margin-bottom: 30px;
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚂</div>
        <h1>TrackRat</h1>
        <p class="subtitle">Real-time NJ Transit & Amtrak tracking</p>
        
        <div class="train-info" id="trainInfo">
            <div class="train-id" id="trainId">Loading train info...</div>
            <div class="route" id="route"></div>
        </div>
        
        <a href="https://apps.apple.com/app/trackrat/idXXXXXXXXX" class="download-btn">
            📱 Download TrackRat
        </a>
        
        <a href="#" id="openApp" class="download-btn" style="display: none;">
            🚀 Open in TrackRat
        </a>
        
        <div class="footer">
            Get real-time train updates, track predictions, and Live Activities on your iPhone.
        </div>
    </div>

    <script>
        // Parse URL to extract train information
        function parseTrainInfo() {
            const path = window.location.pathname;
            const urlParams = new URLSearchParams(window.location.search);
            
            // Extract train ID from path (/train/123)
            const pathParts = path.split('/');
            if (pathParts.length >= 3 && pathParts[1] === 'train') {
                const trainId = pathParts[2];
                const fromCode = urlParams.get('from');
                const toCode = urlParams.get('to');
                
                document.getElementById('trainId').textContent = `Train ${trainId}`;
                
                if (fromCode || toCode) {
                    let route = '';
                    if (fromCode) route += fromCode;
                    if (fromCode && toCode) route += ' → ';
                    if (toCode) route += toCode;
                    document.getElementById('route').textContent = route;
                }
                
                // Show "Open in App" button if user might have the app
                if (navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad')) {
                    const openAppBtn = document.getElementById('openApp');
                    openAppBtn.style.display = 'inline-block';
                    openAppBtn.href = `trackrat://train/${trainId}${window.location.search}`;
                }
            }
        }
        
        // Attempt to open the app immediately
        function tryOpenApp() {
            if (navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad')) {
                const trainId = window.location.pathname.split('/')[2];
                if (trainId) {
                    const customUrl = `trackrat://train/${trainId}${window.location.search}`;
                    window.location.href = customUrl;
                    
                    // Fallback after a delay
                    setTimeout(() => {
                        // If still on this page after 2 seconds, show the download button
                        console.log('App might not be installed, showing download option');
                    }, 2000);
                }
            }
        }
        
        window.onload = () => {
            parseTrainInfo();
            tryOpenApp();
        };
    </script>
</body>
</html>
